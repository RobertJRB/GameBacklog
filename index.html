<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameBacklog — Mi Colección</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Fondo animado -->
    <div class="bg-grid"></div>
    <div class="scanlines"></div>

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">GAME<span class="logo-accent">BACKLOG</span></span>
        </div>
        <button class="btn-add" id="btnOpenModal">
          <span class="btn-icon">+</span> AGREGAR JUEGO
        </button>
      </div>
    </header>

    <!-- Stats bar -->
    <section class="stats-bar">
      <div class="stats-inner">
        <div class="stat-item">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">TOTAL</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num playing" id="statJugando">0</span>
          <span class="stat-label">JUGANDO</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num done" id="statTerminados">0</span>
          <span class="stat-label">TERMINADOS</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num pending" id="statPorJugar">0</span>
          <span class="stat-label">POR JUGAR</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num rating" id="statPromedio">—</span>
          <span class="stat-label">PROMEDIO ★</span>
        </div>
      </div>
    </section>

    <!-- Filtros y búsqueda -->
    <section class="filters-section">
      <div class="filters-inner">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar juego..."
            class="search-input"
          />
        </div>
        <div class="filter-group">
          <select id="filterEstado" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="Por jugar">Por jugar</option>
            <option value="Jugando">Jugando</option>
            <option value="Terminado">Terminado</option>
            <option value="Abandonado">Abandonado</option>
          </select>
          <select id="filterGenero" class="filter-select">
            <option value="">Todos los géneros</option>
            <option value="Acción">Acción</option>
            <option value="Aventura">Aventura</option>
            <option value="RPG">RPG</option>
            <option value="Estrategia">Estrategia</option>
            <option value="Deportes">Deportes</option>
            <option value="Simulación">Simulación</option>
            <option value="Terror">Terror</option>
            <option value="Plataformas">Plataformas</option>
            <option value="Puzzle">Puzzle</option>
            <option value="Lucha">Lucha</option>
            <option value="Carreras">Carreras</option>
            <option value="Otro">Otro</option>
          </select>
          <select id="filterPlataforma" class="filter-select">
            <option value="">Todas las plataformas</option>
            <option value="PC">PC</option>
            <option value="PlayStation 5">PlayStation 5</option>
            <option value="PlayStation 4">PlayStation 4</option>
            <option value="Xbox Series X/S">Xbox Series X/S</option>
            <option value="Xbox One">Xbox One</option>
            <option value="Nintendo Switch">Nintendo Switch</option>
            <option value="Mobile">Mobile</option>
            <option value="Otro">Otro</option>
          </select>
          <button class="btn-clear" id="btnClearFilters">✕ LIMPIAR</button>
        </div>
      </div>
    </section>

    <!-- Lista de juegos -->
    <main class="main-content">
      <div id="gameGrid" class="game-grid">
        <!-- Las tarjetas se generan dinámicamente -->
      </div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">🎮</div>
        <p class="empty-title">Sin resultados</p>
        <p class="empty-sub">Agrega tu primer juego o cambia los filtros</p>
      </div>
    </main>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
      <span id="toastMsg"></span>
    </div>

    <!-- Modal: Crear / Editar juego -->
    <div id="gameModal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modalTitle">NUEVO JUEGO</h2>
          <button class="modal-close" id="btnCloseModal">✕</button>
        </div>
        <form id="gameForm" class="modal-form" novalidate>
          <input type="hidden" id="gameId" />

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">TÍTULO <span class="required">*</span></label>
              <input type="text" id="fTitulo" class="form-input" placeholder="Nombre del juego" minlength="2" maxlength="100" required />
              <span class="form-error" id="errTitulo"></span>
            </div>
            <div class="form-group">
              <label class="form-label">AÑO DE LANZAMIENTO</label>
              <input type="number" id="fAnio" class="form-input" placeholder="2024" min="1970" max="2027" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">GÉNERO <span class="required">*</span></label>
              <select id="fGenero" class="form-input" required>
                <option value="">Selecciona un género</option>
                <option value="Acción">Acción</option>
                <option value="Aventura">Aventura</option>
                <option value="RPG">RPG</option>
                <option value="Estrategia">Estrategia</option>
                <option value="Deportes">Deportes</option>
                <option value="Simulación">Simulación</option>
                <option value="Terror">Terror</option>
                <option value="Plataformas">Plataformas</option>
                <option value="Puzzle">Puzzle</option>
                <option value="Lucha">Lucha</option>
                <option value="Carreras">Carreras</option>
                <option value="Otro">Otro</option>
              </select>
              <span class="form-error" id="errGenero"></span>
            </div>
            <div class="form-group">
              <label class="form-label">PLATAFORMA <span class="required">*</span></label>
              <select id="fPlataforma" class="form-input" required>
                <option value="">Selecciona plataforma</option>
                <option value="PC">PC</option>
                <option value="PlayStation 5">PlayStation 5</option>
                <option value="PlayStation 4">PlayStation 4</option>
                <option value="Xbox Series X/S">Xbox Series X/S</option>
                <option value="Xbox One">Xbox One</option>
                <option value="Nintendo Switch">Nintendo Switch</option>
                <option value="Mobile">Mobile</option>
                <option value="Otro">Otro</option>
              </select>
              <span class="form-error" id="errPlataforma"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ESTADO <span class="required">*</span></label>
              <select id="fEstado" class="form-input" required>
                <option value="Por jugar">Por jugar</option>
                <option value="Jugando">Jugando</option>
                <option value="Terminado">Terminado</option>
                <option value="Abandonado">Abandonado</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">CALIFICACIÓN (0–10)</label>
              <input type="number" id="fCalificacion" class="form-input" placeholder="7.5" min="0" max="10" step="0.5" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">URL PORTADA (opcional)</label>
            <input type="url" id="fPortada" class="form-input" placeholder="https://..." />
          </div>

          <div class="form-group">
            <label class="form-label">NOTAS</label>
            <textarea id="fNotas" class="form-input form-textarea" placeholder="Comentarios personales..." maxlength="500"></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" id="btnCancelForm">CANCELAR</button>
            <button type="submit" class="btn-save" id="btnSave">GUARDAR</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal: Confirmar eliminación -->
    <div id="deleteModal" class="modal-overlay hidden">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2 class="modal-title danger">⚠ ELIMINAR JUEGO</h2>
        </div>
        <p class="delete-msg">¿Seguro que deseas eliminar <strong id="deleteGameName"></strong>? Esta acción no se puede deshacer.</p>
        <input type="hidden" id="deleteGameId" />
        <div class="modal-actions">
          <button class="btn-cancel" id="btnCancelDelete">CANCELAR</button>
          <button class="btn-delete-confirm" id="btnConfirmDelete">ELIMINAR</button>
        </div>
      </div>
    </div>

    <!-- Modal: Ver detalle -->
    <div id="detailModal" class="modal-overlay hidden">
      <div class="modal modal-detail">
        <div class="modal-header">
          <h2 class="modal-title" id="detailTitle">DETALLE</h2>
          <button class="modal-close" id="btnCloseDetail">✕</button>
        </div>
        <div id="detailContent" class="detail-content"></div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
